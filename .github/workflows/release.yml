# Publishes the gem to RubyGems when a v* tag is pushed, via RubyGems
# trusted publishing (OIDC) — no API key, no OTP prompt.
#
# One-time setup on rubygems.org (gem owner):
#   Gem page → Ownership → Trusted publishers → GitHub Actions →
#   repository: yshmarov/feedback-engine, workflow: release.yml
#
# Release flow after that:
#   git tag v0.x.y && git push origin v0.x.y
name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v5
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4"
          bundler-cache: true
      - uses: rubygems/release-gem@v1
